name: Build SIGNALIS TRPG APK v0.0.11

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          java -version
          javac -version

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev \
            libltdl-dev git wget unzip default-jdk libstdc++6:i386 \
            libgcc-s1:i386 zlib1g:i386 ccache
          ccache --max-size=2G

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37 pyjnius

      - name: Install Chinese font from system package
        run: |
          mkdir -p fonts
          # Install Noto CJK fonts from Ubuntu package (reliable, no download issues)
          sudo apt-get install -y -qq fonts-noto-cjk
          # Find the installed CJK font and copy to project
          # Ubuntu fonts-noto-cjk installs .ttc files; we support both .ttc and .otf
          FONT_FILE=$(find /usr/share/fonts -name "NotoSansCJK*Regular*" 2>/dev/null | head -1)
          if [ -z "$FONT_FILE" ]; then
            FONT_FILE=$(find /usr/share/fonts -name "NotoSansSC*Regular*" 2>/dev/null | head -1)
          fi
          if [ -n "$FONT_FILE" ]; then
            # Copy with original extension to preserve .ttc
            cp "$FONT_FILE" fonts/
            echo "Font installed: $FONT_FILE -> fonts/"
            ls -lh fonts/
          else
            echo "WARNING: No CJK font found in system, will use Android system fallback"
            find /usr/share/fonts -name "*Noto*" 2>/dev/null | head -20 || true
          fi
          # Verify font files
          FONT_COUNT=$(ls fonts/ 2>/dev/null | wc -l)
          echo "Font files in fonts/: $FONT_COUNT"
          ls -la fonts/ || true

      - name: Restore Buildozer cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-v0.0.11-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('.github/workflows/build_apk.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v0.0.11-

      - name: Initialize buildozer and download p4a
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android update || true

      - name: Fix p4a recipe versions (force 3.11.9)
        run: |
          P4A=".buildozer/android/platform/python-for-android/pythonforandroid/recipes"
          if [ ! -d "$P4A" ]; then
            echo "WARNING: p4a not found, reinitializing..."
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            buildozer android update || true
          fi
          for r in hostpython3 python3; do
            f="$P4A/$r/__init__.py"
            if [ -f "$f" ]; then
              sed -i 's/version = "[0-9]\+\.[0-9]\+\.[0-9]\+"/version = "3.11.9"/g' "$f"
              echo "Fixed $r:"
              grep -n 'version' "$f" | grep -i '3\.11' | head -2
            fi
          done

      - name: THOROUGH clean - remove ALL old dists and builds
        run: |
          echo "=== THOROUGH CLEAN ==="
          for dist_dir in .buildozer/android/platform/build-*/dists/*/; do
            if [ -d "$dist_dir" ]; then
              echo "Removing cached dist: $dist_dir"
              rm -rf "$dist_dir"
            fi
          done
          for build_dir in .buildozer/android/platform/build-*/build/; do
            if [ -d "$build_dir" ]; then
              echo "Removing build dir: $build_dir"
              rm -rf "$build_dir"
            fi
          done
          rm -rf .buildozer/android/app 2>/dev/null || true
          rm -rf bin/*.apk 2>/dev/null || true
          echo "Clean complete."

      - name: Build APK with strict error checking
        timeout-minutes: 120
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug 2>&1 | tee buildozer.log
          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK found anywhere after build!"
            echo "=== Buildozer last 100 lines ==="
            tail -n 100 buildozer.log
            exit 1
          fi
          echo "Found $APK_COUNT APK file(s):"
          find . -name "*.apk" -type f 2>/dev/null

      - name: Verify APK output
        run: |
          echo "=== APK files in bin/ ==="
          ls -la bin/*.apk 2>/dev/null || echo "No APK in bin/"
          echo "=== All APK files ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signalis-trpg-v0.0.11
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          tag_name: v0.0.11
          name: SIGNALIS TRPG v0.0.11
          body: |
            ## SIGNALIS TRPG 判定程序 v0.0.11
            ### Bug 修复
            - **修复中间栏/右栏黑屏**：`main.py` 中 `CenterPanel` 和 `RightPanel` 添加 `add_panel_bg(self, PANEL_COLOR)`，确保 Android 上背景正确绘制
            - **修复 Popup 黑屏**：所有 Popup 子类（`ConfirmPopup`、`CharacterEditorPopup`、`TemplateSelectorPopup`、`EnemyTemplateSelectorPopup`、`HumanHealPopup`、`InfoPopup`）在 `__init__` 中显式设置 `self.background = ''` 并调用 `add_panel_bg(self)`，双重保险覆盖 Android 默认背景渲染异常
            - **修复滑动不流畅**：`signalis.kv` 中将 `<ScrollView>` 的 `scroll_type` 从 `['bars', 'content']` 改为 `['content']`，禁用滚动条避免触摸干扰；`main.py` 中所有 `ScrollView` 实例显式设置 `do_scroll_y=True`
            - **修复按钮文字截断**：`_make_char_button` 中 `font_size` 从 `sp(11)` 降至 `sp(10)`，`height` 从 `dp(36)` 增至 `dp(40)`，为中文留出足够空间
            - 保留 v0.0.10 所有修复：TabbedPanel 黑屏修复、Spinner 下拉中文修复、移除 `MainLayout.on_size()` 错位修复、Android 15 兼容、Python 3.11.9 锁定
          files: |
            bin/*.apk
            **/*.apk
          draft: false
          prerelease: false
