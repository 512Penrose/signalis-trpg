name: Build SIGNALIS TRPG APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev \
            libltdl-dev git wget unzip default-jdk
          pip install --upgrade pip
          pip install buildozer cython

      - name: Restore Buildozer cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: ~/.buildozer
          key: buildozer-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v2-

      - name: Download SDK/NDK and accept licenses
        run: |
          export JAVA_HOME=/usr/lib/jvm/default-java
          export PATH=$JAVA_HOME/bin:$PATH
          export ANDROID_SDK=$HOME/.buildozer/android/platform/android-sdk
          
          # Step 1: Let buildozer download SDK and NDK first
          buildozer android update || true
          
          # Step 2: Accept all SDK licenses
          if [ -d "$ANDROID_SDK/tools/bin" ]; then
            yes | $ANDROID_SDK/tools/bin/sdkmanager --sdk_root=$ANDROID_SDK --licenses || true
          fi
          
          # Step 3: Install build-tools and platform-tools explicitly
          if [ -d "$ANDROID_SDK/tools/bin" ]; then
            $ANDROID_SDK/tools/bin/sdkmanager --sdk_root=$ANDROID_SDK \
              "platform-tools" \
              "build-tools;33.0.0" \
              "platforms;android-33" || true
          fi
          
          # Step 4: Verify build-tools exist
          ls -la $ANDROID_SDK/build-tools/ 2>/dev/null || echo "WARNING: build-tools not found"
          ls -la $ANDROID_SDK/platform-tools/ 2>/dev/null || echo "WARNING: platform-tools not found"

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/default-java
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug
        timeout-minutes: 45

      - name: Save Buildozer cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.buildozer
          key: buildozer-v2-${{ hashFiles('buildozer.spec') }}-${{ github.run_id }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signalis-trpg-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SIGNALIS TRPG v2.0 Build ${{ github.run_number }}
          body: |
            ## SIGNALIS TRPG 判定程序 APK

            ### 安装方式
            1. 下载 `signalis-trpg.apk`
            2. 在安卓手机上允许"未知来源"安装
            3. 安装并运行（横屏模式）

            ### 功能
            - 完整的共振骰池系统(RDPS)判定
            - 角色/敌人管理
            - 8大功能Tab（基础检定/对抗/战斗/恐怖/共振/PCD/贴贴/恢复）
            - 中文显示完整补全

            ### 适配
            - 横屏模式
            - 分辨率适配（2772x1280等折叠屏）
            - 暗色主题（SIGNALIS风格）
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
