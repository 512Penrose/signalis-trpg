name: Build SIGNALIS TRPG APK v0.0.6

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          java -version
          javac -version

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev \
            libltdl-dev git wget unzip default-jdk libstdc++6:i386 \
            libgcc-s1:i386 zlib1g:i386 ccache
          ccache --max-size=2G

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37 pyjnius

      - name: Download Chinese font
        run: |
          mkdir -p fonts
          wget -q --timeout=30 -O fonts/NotoSansSC-Regular.otf \
            "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/SimplifiedChinese/NotoSansSC-Regular.otf" \
            || curl -L --max-time 30 -o fonts/NotoSansSC-Regular.otf \
              "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/SimplifiedChinese/NotoSansSC-Regular.otf" \
            || true
          if [ -f "fonts/NotoSansSC-Regular.otf" ] && [ -s "fonts/NotoSansSC-Regular.otf" ]; then
            echo "Font downloaded: $(ls -lh fonts/NotoSansSC-Regular.otf)"
          else
            echo "WARNING: Font download failed, using system fallback"
            rm -f fonts/NotoSansSC-Regular.otf
          fi
          ls -la fonts/ || true

      - name: Restore Buildozer cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-v0.0.6-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('.github/workflows/build_apk.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v0.0.6-

      - name: Initialize buildozer and download p4a
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android update || true

      - name: Fix p4a recipe versions (force 3.11.9)
        run: |
          P4A=".buildozer/android/platform/python-for-android/pythonforandroid/recipes"
          if [ ! -d "$P4A" ]; then
            echo "WARNING: p4a not found, reinitializing..."
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            buildozer android update || true
          fi
          for r in hostpython3 python3; do
            f="$P4A/$r/__init__.py"
            if [ -f "$f" ]; then
              sed -i 's/version = "[0-9]\+\.[0-9]\+\.[0-9]\+"/version = "3.11.9"/g' "$f"
              echo "Fixed $r:"
              grep -n 'version' "$f" | grep -i '3\.11' | head -2
            fi
          done

      - name: THOROUGH clean - remove ALL old dists and builds
        run: |
          echo "=== THOROUGH CLEAN ==="
          # Remove all dist directories to force rebuild
          for dist_dir in .buildozer/android/platform/build-*/dists/*/; do
            if [ -d "$dist_dir" ]; then
              echo "Removing cached dist: $dist_dir"
              rm -rf "$dist_dir"
            fi
          done
          # Remove all build directories
          for build_dir in .buildozer/android/platform/build-*/build/; do
            if [ -d "$build_dir" ]; then
              echo "Removing build dir: $build_dir"
              rm -rf "$build_dir"
            fi
          done
          # Remove app staging
          rm -rf .buildozer/android/app 2>/dev/null || true
          # Remove old APKs
          rm -rf bin/*.apk 2>/dev/null || true
          echo "Clean complete. Listing remaining dists:"
          find .buildozer -name "dists" -type d 2>/dev/null | while read d; do
            ls -la "$d" 2>/dev/null || true
          done

      - name: Build APK (first pass) with full logging
        timeout-minutes: 120
        continue-on-error: true
        id: build1
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug -v 2>&1 | tee buildozer_full.log || echo "BUILD_FAILED=1" >> $GITHUB_ENV

      - name: Dump build logs if first pass failed
        if: env.BUILD_FAILED == '1' || steps.build1.outcome == 'failure'
        run: |
          echo "=== FIRST PASS FAILED - DUMPING LOGS ==="
          if [ -f "buildozer_full.log" ]; then
            echo "--- Last 200 lines of buildozer_full.log ---"
            tail -n 200 buildozer_full.log
          fi
          echo "--- Searching for ERROR in buildozer ---"
          grep -n "ERROR\|Error\|error\|FAILURE\|FAILED\|Exception\|Traceback" buildozer_full.log 2>/dev/null | tail -30 || true
          echo "--- Gradle logs ---"
          find .buildozer -name "*.log" -path "*/outputs/*" 2>/dev/null | head -3 | while read f; do
            echo "--- $f ---"
            tail -n 50 "$f" || true
          done
          echo "--- Gradle reports ---"
          find .buildozer -name "problems-report.html" 2>/dev/null | head -1 | while read f; do
            echo "Report: $f"
            cat "$f" 2>/dev/null | head -50 || true
          done

      - name: Fix p4a again (if first failed)
        if: env.BUILD_FAILED == '1' || steps.build1.outcome == 'failure'
        run: |
          P4A=".buildozer/android/platform/python-for-android/pythonforandroid/recipes"
          for r in hostpython3 python3; do
            f="$P4A/$r/__init__.py"
            [ -f "$f" ] && sed -i 's/version = "[0-9]\+\.[0-9]\+\.[0-9]\+"/version = "3.11.9"/g' "$f"
          done

      - name: Build APK (second pass)
        timeout-minutes: 120
        if: env.BUILD_FAILED == '1' || steps.build1.outcome == 'failure'
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug -v 2>&1 | tee buildozer_full2.log

      - name: Final log dump if completely failed
        if: failure()
        run: |
          echo "=== COMPLETE BUILD FAILURE - ALL LOGS ==="
          for log in buildozer_full.log buildozer_full2.log; do
            if [ -f "$log" ]; then
              echo "--- $log (last 100 lines) ---"
              tail -n 100 "$log" || true
            fi
          done
          echo "--- All gradle errors ---"
          find .buildozer -name "*.log" 2>/dev/null | while read f; do
            grep -H "FAILURE\|error\|ERROR" "$f" 2>/dev/null | tail -5 || true
          done

      - name: Verify APK output
        run: |
          echo "=== APK files ==="
          ls -la bin/*.apk 2>/dev/null || echo "No APK in bin/"
          find . -name "*.apk" -type f 2>/dev/null | head -5

      - name: Save Buildozer cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-v0.0.6-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('.github/workflows/build_apk.yml') }}-${{ github.run_id }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signalis-trpg-v0.0.6
          path: bin/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.6
          name: SIGNALIS TRPG v0.0.6
          body: |
            ## SIGNALIS TRPG 判定程序 v0.0.6
            - Java 17 修复 Gradle 构建
            - API 33 + NDK 25b 稳定兼容
            - 内置 NotoSansSC 字体
            - Python 3.11.9 锁定
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
