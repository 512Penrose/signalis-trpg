name: Build SIGNALIS TRPG APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev \
            libltdl-dev git wget unzip default-jdk android-sdk aidl
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Build APK with Buildozer
        run: |
          export JAVA_HOME=/usr/lib/jvm/default-java
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug
        timeout-minutes: 45

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signalis-trpg-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SIGNALIS TRPG v2.0 Build ${{ github.run_number }}
          body: |
            ## SIGNALIS TRPG 判定程序 APK

            ### 安装方式
            1. 下载 `signalis-trpg.apk`
            2. 在安卓手机上允许"未知来源"安装
            3. 安装并运行（横屏模式）

            ### 功能
            - 完整的共振骰池系统(RDPS)判定
            - 角色/敌人管理
            - 8大功能Tab（基础检定/对抗/战斗/恐怖/共振/PCD/贴贴/恢复）
            - 中文显示完整补全

            ### 适配
            - 横屏模式
            - 分辨率适配（2772x1280等折叠屏）
            - 暗色主题（SIGNALIS风格）
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
