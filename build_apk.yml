name: Build SIGNALIS TRPG APK v0.0.8

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          java -version
          javac -version

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev \
            libltdl-dev git wget unzip default-jdk libstdc++6:i386 \
            libgcc-s1:i386 zlib1g:i386 ccache
          ccache --max-size=2G

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37 pyjnius

      - name: Install Chinese font from system package
        run: |
          mkdir -p fonts
          # Install Noto CJK fonts from Ubuntu package (reliable, no download issues)
          sudo apt-get install -y -qq fonts-noto-cjk
          # Find the installed CJK font and copy to project
          FONT_FILE=$(find /usr/share/fonts -name "NotoSansCJKsc-Regular.otf" 2>/dev/null | head -1)
          if [ -z "$FONT_FILE" ]; then
            FONT_FILE=$(find /usr/share/fonts -name "NotoSansSC-Regular.otf" 2>/dev/null | head -1)
          fi
          if [ -n "$FONT_FILE" ]; then
            cp "$FONT_FILE" fonts/NotoSansSC-Regular.otf
            echo "Font installed: $FONT_FILE -> fonts/NotoSansSC-Regular.otf"
            ls -lh fonts/NotoSansSC-Regular.otf
          else
            echo "WARNING: No CJK font found in system, will use Android system fallback"
            find /usr/share/fonts -name "*Noto*" 2>/dev/null | head -20 || true
          fi
          # Verify font file
          SIZE=$(stat -c%s fonts/NotoSansSC-Regular.otf 2>/dev/null || echo 0)
          echo "Font size: $SIZE bytes"
          if [ "$SIZE" -lt 1024 ]; then
            echo "WARNING: Font file too small or missing, using system fallback"
            rm -f fonts/NotoSansSC-Regular.otf
          else
            echo "Font validation passed"
          fi
          ls -la fonts/ || true

      - name: Restore Buildozer cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-v0.0.8-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('.github/workflows/build_apk.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v0.0.8-

      - name: Initialize buildozer and download p4a
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android update || true

      - name: Fix p4a recipe versions (force 3.11.9)
        run: |
          P4A=".buildozer/android/platform/python-for-android/pythonforandroid/recipes"
          if [ ! -d "$P4A" ]; then
            echo "WARNING: p4a not found, reinitializing..."
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            buildozer android update || true
          fi
          for r in hostpython3 python3; do
            f="$P4A/$r/__init__.py"
            if [ -f "$f" ]; then
              sed -i 's/version = "[0-9]\+\.[0-9]\+\.[0-9]\+"/version = "3.11.9"/g' "$f"
              echo "Fixed $r:"
              grep -n 'version' "$f" | grep -i '3\.11' | head -2
            fi
          done

      - name: THOROUGH clean - remove ALL old dists and builds
        run: |
          echo "=== THOROUGH CLEAN ==="
          for dist_dir in .buildozer/android/platform/build-*/dists/*/; do
            if [ -d "$dist_dir" ]; then
              echo "Removing cached dist: $dist_dir"
              rm -rf "$dist_dir"
            fi
          done
          for build_dir in .buildozer/android/platform/build-*/build/; do
            if [ -d "$build_dir" ]; then
              echo "Removing build dir: $build_dir"
              rm -rf "$build_dir"
            fi
          done
          rm -rf .buildozer/android/app 2>/dev/null || true
          rm -rf bin/*.apk 2>/dev/null || true
          echo "Clean complete."

      - name: Build APK with strict error checking
        timeout-minutes: 120
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug 2>&1 | tee buildozer.log
          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK found anywhere after build!"
            echo "=== Buildozer last 100 lines ==="
            tail -n 100 buildozer.log
            exit 1
          fi
          echo "Found $APK_COUNT APK file(s):"
          find . -name "*.apk" -type f 2>/dev/null

      - name: Verify APK output
        run: |
          echo "=== APK files in bin/ ==="
          ls -la bin/*.apk 2>/dev/null || echo "No APK in bin/"
          echo "=== All APK files ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signalis-trpg-v0.0.8
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.8
          name: SIGNALIS TRPG v0.0.8
          body: |
            ## SIGNALIS TRPG 判定程序 v0.0.8
            - Kivy Spinner 兼容性修复（移除无效参数）
            - NotoSansSC 字体加载验证与错误处理
            - Android 15 全屏兼容（移除 android:theme 冲突）
            - Python 3.11.9 锁定，避免自动升级问题
            - 使用 Ubuntu 系统字体包安装 CJK 字体
          files: |
            bin/*.apk
            **/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
